name: Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        # Matches the Vercel production runtime
        node-version: 22.x
        cache: 'npm'
    - run: npm ci
    - run: npm run lint
